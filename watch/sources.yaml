  backlog_path: /Users/shine/videoatexto/watch/backlog.md
  manual_scan_queue_path: /Users/shine/videoatexto/watch/manual_scan_queue.md
  state_path: /Users/shine/videoatexto/watch/state.yaml

  youtube_scan_limit: 30
  youtube_search_limit: 15        # nº de resultados por búsqueda YT
  github_activity_limit: 30       # nº de eventos atom por usuario

  min_duration_seconds: 180
  max_duration_seconds: 18000
  min_views_for_mention: 500      # filtro de calidad para search results

  whisper_model: medium
  max_age_days: 30                # no procesar contenido más antiguo
