#
# Tipos soportados:
#   youtube_channel       — canal propio (URL canal)
#   youtube_search        — búsqueda por keywords
#   github_user           — atom feed de actividad pública de usuario
#   github_repo_activity  — atom feed de un repo concreto (commits/issues/releases)
#   x_account             — manual via Chrome MCP (genera recordatorio en queue)
#   x_search              — búsqueda X — manual
#   web_rss               — feed RSS/Atom genérico
#
# Frecuencias: daily | weekly | manual

